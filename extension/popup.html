<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light dark; }
    body { width: 320px; margin: 0; padding: 14px; font: 13px/1.45 system-ui, sans-serif; }
    h1 { font-size: 14px; margin: 0 0 2px; }
    p.sub { margin: 0 0 12px; color: #888; font-size: 12px; }
    .api { font-size: 12px; color: #888; margin-bottom: 10px; }
    .api b { color: inherit; }
    .client { display: flex; align-items: center; gap: 9px; border: 1px solid #8883; border-radius: 9px; padding: 8px 10px; margin-bottom: 7px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; flex: none; border: 1px solid #0002; }
    .meta { min-width: 0; }
    .meta .name { font-weight: 700; }
    .meta .host { color: #888; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tag { margin-left: auto; font-size: 11px; color: #16a34a; border: 1px solid #16a34a55; border-radius: 999px; padding: 1px 7px; }
    .tag.off { color: #999; border-color: #9994; }
    .note { font-size: 11px; color: #999; margin: 10px 0 0; }
    code { background: #8882; padding: 1px 5px; border-radius: 4px; }
    button { width: 100%; margin-top: 10px; padding: 8px; border: 1px solid #8884; background: transparent; color: inherit; border-radius: 8px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Voice Assistant — clients</h1>
  <p class="sub">The widget appears only on the sites below.</p>
  <div class="api" id="api"></div>
  <div id="clients"></div>
  <p class="note">Add or edit clients in <code>extension/clients.json</code>, then reload the page.</p>
  <button id="reload">Reload current tab</button>
  <script src="popup.js"></script>
</body>
</html>
